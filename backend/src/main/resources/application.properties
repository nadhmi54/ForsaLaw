# ForsaLaw Backend
#
# Variables d'environnement utiles (secrets : ne pas committer ; utiliser un fichier .env local ou la configuration IDE) :
#   DB_URL, DB_USERNAME, DB_PASSWORD
#   JWT_SECRET, JWT_EXPIRATION_MS
#   GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, OAUTH2_SUCCESS_REDIRECT_URI
#   MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD, MAIL_FROM
#   PASSWORD_RESET_FRONTEND_URL
#   FRONTEND_BASE_URL - lien dans les e-mails (sans front : Swagger ; valeur par defaut ci-dessous)
#   NOTIFICATIONS_TIMEZONE - fuseau IANA pour les rappels RDV J-1 / H-1
#   JITSI_BASE_URL - service de visioconference gratuit pour les RDV en ligne
#   ADMIN_SUPPORT_EMAIL - email admin pour les demandes de deblocage de compte
#   SERVER_PORT
#
spring.application.name=forsalaw-backend
server.port=${SERVER_PORT:8081}
server.error.include-message=always

# PostgreSQL (Docker) - lancer d'abord : docker-compose up -d
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/forsalaw}
spring.datasource.username=${DB_USERNAME:forsalaw}
spring.datasource.password=${DB_PASSWORD:forsalaw}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate : creation et mise a jour automatiques du schema a partir des @Entity
spring.jpa.hibernate.ddl-auto=update

# Flyway desactive : schema gere par Hibernate (ddl-auto). Activer ponctuellement pour appliquer le SQL RAG (V1__rag_...).
spring.flyway.enabled=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT (en production : definir une cle longue et securisee via les variables d'environnement)
forsalaw.jwt.secret=${JWT_SECRET:change-me-dev-only-min-32-characters}
forsalaw.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# OAuth2 Google (connexion avec Google)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:disabled-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:disabled-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
forsalaw.oauth2.success-redirect-uri=${OAUTH2_SUCCESS_REDIRECT_URI:http://localhost:4200/auth/google/callback}

# SMTP - e-mails (reinitialisation du mot de passe et notifications RDV)
# Le bean JavaMailSender est cree si spring-boot-starter-mail est present ; sans identifiants valides, l'envoi echoue (logs ERROR).
# Variables : MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD, MAIL_FROM (voir aussi IDE / systeme : redemarrer l'app apres modification).
# Gmail : activer 2FA + "mot de passe d'application" ; MAIL_FROM doit en general etre la MEME adresse que MAIL_USERNAME (sinon refus ou spam).
# Debogage SMTP (tres verbeux) : spring.mail.properties.mail.debug=true
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
forsalaw.mail.from=${MAIL_FROM:${MAIL_USERNAME:no-reply@forsalaw.local}}
# Page front avec ?token=... (sans front en developpement : conserver l'URL ci-dessous ou une URL factice ; le lien dans l'e-mail reste inutilisable tant que le front n'existe pas).
forsalaw.password-reset.frontend-url=${PASSWORD_RESET_FRONTEND_URL:http://localhost:4200/reset-password}
# Lien "Acceder a ForsaLaw" dans les e-mails RDV. Sans frontend : valeur par defaut = Swagger (meme machine que l'API).
# Lorsque le front est disponible : FRONTEND_BASE_URL=http://localhost:4200 (ou l'URL de production).
forsalaw.app.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:8081/swagger-ui.html}
# Fuseau IANA pour les rappels planifies J-1 (08:00) et H-1 (toutes les 15 min). Ex. : Africa/Tunis, Europe/Paris.
forsalaw.notifications.timezone=${NOTIFICATIONS_TIMEZONE:Africa/Tunis}
# URL de base Jitsi pour generer les liens des RDV en ligne.
forsalaw.rdv.jitsi-base-url=${JITSI_BASE_URL:https://meet.jit.si}
# Email de destination pour les demandes de deblocage de compte.
forsalaw.support.admin-email=${ADMIN_SUPPORT_EMAIL:admin@forsalaw.local}

# URL publique de l'API (liens de telechargement des pieces jointes messagerie, JWT dans la query).
forsalaw.server.public-url=${PUBLIC_API_BASE_URL:http://localhost:8081}

# Admin messagerie : empreinte SHA-256 du texte (pas de lecture en clair). Poivre optionnel (variable ADMIN_MESSENGER_HASH_PEPPER).
forsalaw.messenger.admin.hash-pepper=${ADMIN_MESSENGER_HASH_PEPPER:}

# Pieces jointes messagerie : stockage local, validation type/taille, scan ClamAV optionnel.
forsalaw.messenger.attachments.storage-dir=${MESSENGER_ATTACHMENTS_DIR:${user.home}/forsalaw-messenger-attachments}
forsalaw.messenger.attachments.max-size-bytes=${MESSENGER_ATTACHMENT_MAX_BYTES:10485760}
forsalaw.messenger.attachments.max-files-per-message=${MESSENGER_ATTACHMENT_MAX_FILES:5}
forsalaw.messenger.attachments.download-token-expiration-ms=${MESSENGER_ATTACHMENT_DL_TOKEN_MS:900000}
forsalaw.messenger.attachments.clamav.enabled=${CLAMAV_ENABLED:false}
forsalaw.messenger.attachments.clamav.host=${CLAMAV_HOST:localhost}
forsalaw.messenger.attachments.clamav.port=${CLAMAV_PORT:3310}

# Coffre-fort numérique : stockage local des documents
forsalaw.documents.dir=${DOCUMENTS_DIR:${user.home}/forsalaw-documents}

spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE:12MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST:60MB}

# Swagger UI : http://localhost:8081/swagger-ui.html
# Documentation API (JSON) : http://localhost:8081/v3/api-docs
# Optionnel :
# springdoc.swagger-ui.path=/swagger-ui.html
# springdoc.api-docs.path=/v3/api-docs
# En production : desactiver la doc exposee - springdoc.api-docs.enabled=false et springdoc.swagger-ui.enabled=false

# --- WhatsApp Bridge ---
# Activer l'envoi WhatsApp en arriÃ¨re plan (mettre false pour tester sans envoyer de vrais messages)
forsalaw.whatsapp.enabled=${WHATSAPP_ENABLED:true}
forsalaw.whatsapp.bridge-url=${WHATSAPP_BRIDGE_URL:http://localhost:3099}
