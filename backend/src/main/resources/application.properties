# ForsaLaw Backend
spring.application.name=forsalaw-backend
server.port=8081

# PostgreSQL (Docker) - lancer d'abord : docker-compose up -d
spring.datasource.url=jdbc:postgresql://localhost:5433/forsalaw
spring.datasource.username=forsalaw
spring.datasource.password=forsalaw
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate : création/mise à jour automatique du schéma depuis les @Entity
spring.jpa.hibernate.ddl-auto=update

# Flyway désactivé : schéma géré automatiquement par JPA/Hibernate
spring.flyway.enabled=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT (secrets via variables d'environnement)
forsalaw.jwt.secret=${JWT_SECRET:change-me-in-env}
forsalaw.jwt.expiration-ms=86400000

# OAuth2 Google (Login with Google)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:disabled-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:disabled-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
forsalaw.oauth2.success-redirect-uri=${OAUTH2_SUCCESS_REDIRECT_URI:http://localhost:4200/auth/google/callback}

# Swagger UI : http://localhost:8081/swagger-ui.html
# API docs (JSON) : http://localhost:8081/v3/api-docs
# Optionnel :
# springdoc.swagger-ui.path=/swagger-ui.html
# springdoc.api-docs.path=/v3/api-docs
# Désactiver en prod : springdoc.api-docs.enabled=false et springdoc.swagger-ui.enabled=false
