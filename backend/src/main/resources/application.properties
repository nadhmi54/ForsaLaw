# ForsaLaw Backend
#
# Variables d'environnement utiles (secrets : ne pas committer, utiliser .env local ou l'IDE) :
#   DB_URL, DB_USERNAME, DB_PASSWORD
#   JWT_SECRET, JWT_EXPIRATION_MS
#   GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, OAUTH2_SUCCESS_REDIRECT_URI
#   MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD, MAIL_FROM
#   PASSWORD_RESET_FRONTEND_URL
#   FRONTEND_BASE_URL — lien dans les emails (sans front : Swagger, voir defaut ci-dessous)
#   NOTIFICATIONS_TIMEZONE — fuseau IANA pour rappels RDV J-1 / H-1
#   SERVER_PORT
#
spring.application.name=forsalaw-backend
server.port=${SERVER_PORT:8081}

# PostgreSQL (Docker) - lancer d'abord : docker-compose up -d
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/forsalaw}
spring.datasource.username=${DB_USERNAME:forsalaw}
spring.datasource.password=${DB_PASSWORD:forsalaw}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate : création/mise à jour automatique du schéma depuis les @Entity
spring.jpa.hibernate.ddl-auto=update

# Flyway désactivé : schéma géré automatiquement par JPA/Hibernate
spring.flyway.enabled=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT (en prod : mettre une clé longue et sécurisée dans les variables d'environnement)
forsalaw.jwt.secret=${JWT_SECRET:change-me-dev-only-min-32-characters}
forsalaw.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# OAuth2 Google (Login with Google)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:disabled-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:disabled-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
forsalaw.oauth2.success-redirect-uri=${OAUTH2_SUCCESS_REDIRECT_URI:http://localhost:4200/auth/google/callback}

# SMTP — emails (reset mot de passe + notifications RDV)
# Sans MAIL_USERNAME / MAIL_PASSWORD : pas de JavaMailSender, les envois sont journalises (WARN) sans planter l'API.
# Exemple Gmail : creez un "mot de passe d'application" (compte Google > Securite > validation en 2 etapes > mots de passe des applications).
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
forsalaw.mail.from=${MAIL_FROM:no-reply@forsalaw.local}
# Page front avec ?token=... (sans front en dev : laissez l'URL ci-dessous ou une URL factice ; le lien dans l'email ne sera pas utilisable tant que le front n'existe pas).
forsalaw.password-reset.frontend-url=${PASSWORD_RESET_FRONTEND_URL:http://localhost:4200/reset-password}
# Lien "Acceder a ForsaLaw" dans les emails RDV. Sans frontend : defaut = Swagger (meme machine que l'API).
# Quand le front existe : FRONTEND_BASE_URL=http://localhost:4200 (ou votre URL prod).
forsalaw.app.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:8081/swagger-ui.html}
# Fuseau IANA pour rappels planifies J-1 (08:00) et H-1 (toutes les 15 min). Ex. Africa/Tunis, Europe/Paris.
forsalaw.notifications.timezone=${NOTIFICATIONS_TIMEZONE:Africa/Tunis}

# Swagger UI : http://localhost:8081/swagger-ui.html
# API docs (JSON) : http://localhost:8081/v3/api-docs
# Optionnel :
# springdoc.swagger-ui.path=/swagger-ui.html
# springdoc.api-docs.path=/v3/api-docs
# Désactiver en prod : springdoc.api-docs.enabled=false et springdoc.swagger-ui.enabled=false
