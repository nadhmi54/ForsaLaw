# ForsaLaw – CI : build backend/frontend sur chaque push/PR
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build
        run: mvn -q -B compile
      - name: Tests
        run: mvn -q -B test -DskipTests  # Retirer -DskipTests quand les tests seront prêts

  frontend:
    name: Frontend (React/Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  quality:
    name: Repo quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check structure
        run: |
          echo "ForsaLaw repo structure check"
          [ -f backend/pom.xml ] && echo "  backend/pom.xml OK" || true
          [ -d backend/src ] && echo "  backend/src OK" || true
          [ -d frontend ] && echo "  frontend/ OK" || true

  sonarqube:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=ForsaLaw_ForsaLaw
            -Dsonar.organization=forsalaw
            -Dsonar.projectName=ForsaLaw
            -Dsonar.sources=backend/src/main,frontend/src
            -Dsonar.java.binaries=backend/target/classes
            -Dsonar.sourceEncoding=UTF-8
