# ForsaLaw – CI : build backend/frontend sur chaque push/PR
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build
        run: mvn -q -B compile
      - name: Tests
        run: mvn -q -B test -DskipTests  # Retirer -DskipTests quand les tests seront prêts

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  quality:
    name: Repo quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check structure
        run: |
          echo "ForsaLaw repo structure check"
          [ -f backend/pom.xml ] && echo "  backend/pom.xml OK" || true
          [ -d backend/src ] && echo "  backend/src OK" || true
          [ -d frontend ] && echo "  frontend/ OK" || true
