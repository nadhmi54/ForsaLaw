<div class="decay-card" [ngStyle]="containerStyle" #contentRef>
  <svg viewBox="-60 -75 720 900" preserveAspectRatio="xMidYMid slice" class="decay-card__svg">
    <filter [attr.id]="filterId">
      <feTurbulence
        type="turbulence"
        baseFrequency="0.015"
        numOctaves="5"
        seed="4"
        stitchTiles="stitch"
        x="0%"
        y="0%"
        width="100%"
        height="100%"
        result="turbulence1"
      />
      <feDisplacementMap
        #displacementMapRef
        in="SourceGraphic"
        in2="turbulence1"
        scale="0"
        xChannelSelector="R"
        yChannelSelector="B"
        x="0%"
        y="0%"
        width="100%"
        height="100%"
        result="displacementMap3"
      />
    </filter>
    <g>
      <image
        [attr.href]="image"
        x="0"
        y="0"
        width="600"
        height="750"
        [attr.filter]="'url(#' + filterId + ')'"
        preserveAspectRatio="xMidYMid slice"
      />
    </g>
  </svg>
  <div class="decay-card__text">
    <ng-content />
  </div>
</div>
