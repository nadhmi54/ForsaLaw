<div class="folder-viewport" [style.--folder-scale]="size">
  <div class="folder-scale" [ngClass]="className">
    <div
      class="folder"
      [class.open]="isOpen()"
      [class.folder--noninteractive]="!interactive"
      [ngStyle]="folderStyle"
      (click)="toggleOpen()"
      (keydown.enter)="toggleOpen()"
      (keydown.space)="$event.preventDefault(); toggleOpen()"
      [attr.tabindex]="interactive ? 0 : -1"
      [attr.role]="interactive ? 'button' : 'presentation'"
      [attr.aria-expanded]="interactive ? isOpen() : null"
      [attr.aria-label]="interactive ? 'Dossier interactif — cliquer pour ouvrir ou fermer' : null"
    >
      <div class="folder__back">
        @for (item of papers; track $index) {
          <div
            class="paper"
            [ngStyle]="paperStyle($index)"
            (mousemove)="onPaperMouseMove($event, $index)"
            (mouseleave)="onPaperMouseLeave($index)"
          >
            @if (item) {
              <span class="paper__label">{{ item }}</span>
            }
          </div>
        }
        <div class="folder__front"></div>
        <div class="folder__front right"></div>
      </div>
    </div>
  </div>
</div>
