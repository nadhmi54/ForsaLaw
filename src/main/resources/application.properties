# ForsaLaw Backend
spring.application.name=forsalaw-backend
server.port=8081

# PostgreSQL (Docker) - lancer d'abord : docker-compose up -d
spring.datasource.url=jdbc:postgresql://localhost:5433/forsalaw
spring.datasource.username=forsalaw
spring.datasource.password=forsalaw
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate (update : Hibernate gère les entités existantes ; Flyway gère legal_document_chunk)
spring.jpa.hibernate.ddl-auto=update

# Flyway : exécute db/migration/ au démarrage (pgvector + table legal_document_chunk)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT (en prod : mettre une clé longue et sécurisée dans les variables d'environnement)
forsalaw.jwt.secret=forsalaw-secret-key-min-256-bits-pour-hs256-utilisation
forsalaw.jwt.expiration-ms=86400000

# Swagger UI : http://localhost:8081/swagger-ui.html
# API docs (JSON) : http://localhost:8081/v3/api-docs
# Optionnel :
# springdoc.swagger-ui.path=/swagger-ui.html
# springdoc.api-docs.path=/v3/api-docs
# Désactiver en prod : springdoc.api-docs.enabled=false et springdoc.swagger-ui.enabled=false
