# ForsaLaw Backend - configuration minimale (structure)
spring.application.name=forsalaw-backend
server.port=8081

# H2 en mémoire pour le dev (à remplacer par PostgreSQL plus tard)
spring.datasource.url=jdbc:h2:mem:forsalaw
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
