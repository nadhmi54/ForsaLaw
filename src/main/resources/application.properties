# ForsaLaw Backend
spring.application.name=forsalaw-backend
server.port=8081

# PostgreSQL (Docker) - lancer d'abord : docker-compose up -d
spring.datasource.url=jdbc:postgresql://localhost:5433/forsalaw
spring.datasource.username=forsalaw
spring.datasource.password=forsalaw
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false